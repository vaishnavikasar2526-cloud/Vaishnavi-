<!DOCTYPE html>
<html>
<head>
    <title>AJAX Search Suggestion</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
        }

        #search-box {
            width: 300px;
            padding: 8px;
        }

        #suggestions {
            width: 300px;
            border: 1px solid #ccc;
            display: none;
            position: absolute;
            background: #fff;
        }

        .suggestion-item {
            padding: 8px;
            cursor: pointer;
        }

        .suggestion-item:hover {
            background: #f0f0f0;
        }
    </style>
</head>
<body>

<h2>AJAX Search Suggestion</h2>

<input type="text" id="search-box" placeholder="Start typing..." autocomplete="off">
<div id="suggestions"></div>

<script>
$(document).ready(function(){

    $("#search-box").keyup(function(){
        let query = $(this).val();

        if(query.length > 0){
            $.ajax({
                url: "search.php",
                method: "POST",
                data: {search: query},
                success: function(response){
                    $("#suggestions").html(response);
                    $("#suggestions").show();
                }
            });
        } else {
            $("#suggestions").hide();
        }
    });

    // Click on suggestion
    $(document).on("click", ".suggestion-item", function(){
        $("#search-box").val($(this).text());
        $("#suggestions").hide();
    });
    
});
</script>

</body>
</html

<!DOCTYPE html>
<html>
<head>
    <title>Dynamic DOM Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        #content {
            font-size: 20px;
            margin: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            display: inline-block;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>Dynamic Page Using JavaScript DOM</h2>

    <div id="content">
        Click the button to change this content.
    </div>

    <br>
    <button onclick="updateContent()">Click Me</button>

    <script>
        let count = 0;

        function updateContent() {
            count++;

            const contentDiv = document.getElementById("content");

            // Change text
            contentDiv.innerHTML = "Button clicked " + count + " times!";

            // Change background color randomly
            const colors = ["#ffcccc", "#ccffcc", "#ccccff", "#ffffcc"];
            contentDiv.style.backgroundColor =
                colors[Math.floor(Math.random() * colors.length)];

            // Add new paragraph dynamically
            const newPara = document.createElement("p");
            newPara.textContent = "New element added at click " + count;
            document.body.appendChild(newPara);
        }
    </script>

</body>
</html>
