<?php
$items = ["Apple", "Samsung", "Sony", "Dell", "HP", "Lenovo", "Asus", "Canon", "Nikon"];

if(isset($_POST['q'])){
    $q = strtolower($_POST['q']);
    foreach($items as $item){
        if(strpos(strtolower($item), $q) !== false){
            echo "<div>$item</div>";
        }
    }
    exit;
}
?>

<!DOCTYPE html>
<html>
<head>
<title>AJAX Search</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<input type="text" id="search" placeholder="Search...">
<div id="result" style="border:1px solid #ccc; width:200px;"></div>

<script>
$("#search").keyup(function(){
    $.post("", {q: $(this).val()}, function(data){
        $("#result").html(data);
    });
});
</script>

</body>
</html>
